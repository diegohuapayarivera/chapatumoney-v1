# =============================================================================
# SERVER
# =============================================================================
server.port=8000

# =============================================================================
# DATABASE — Supabase (PostgreSQL 15, Session Mode Pooler)
# =============================================================================
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.dugkjkqmaxykltsmunzv
spring.datasource.password=@Notepad1245
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =============================================================================
# JPA / Hibernate
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# =============================================================================
# JACKSON (JSON Serialization)
# =============================================================================
spring.jackson.property-naming-strategy=SNAKE_CASE

# =============================================================================
# JWT via JWKS (Supabase migr&oacute; a llaves asim&eacute;tricas ES256)
# =============================================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://dugkjkqmaxykltsmunzv.supabase.co/auth/v1/.well-known/jwks.json

# =============================================================================
# CORS
